<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Feud - Class Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Setup Screen -->
        <div id="setupScreen" class="screen active">
            <div class="setup-container">
                <h1 class="title">Family Feud</h1>
                <p class="subtitle">Classroom Edition</p>

                <div class="setup-form">
                    <!-- Number of Teams -->
                    <div class="form-group">
                        <label for="teamCount">Number of Teams:</label>
                        <input type="number" id="teamCount" min="2" max="6" value="2">
                    </div>

                    <!-- Teams Container -->
                    <div id="teamsContainer" class="teams-container"></div>

                    <!-- Action Buttons -->
                    <div class="setup-actions">
                        <button id="generateTeamsBtn" class="btn btn-secondary">Generate Teams</button>
                        <button id="startGameBtn" class="btn btn-primary">Start Game</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Game Screen -->
        <div id="gameScreen" class="screen">
            <div class="game-header">
                <div class="scoreboard">
                    <div id="scoreboardContainer" class="scores-grid"></div>
                </div>
                <div class="controls">
                    <button id="nextQuestionBtn" class="btn btn-small">Next Question</button>
                    <button id="clearBoardBtn" class="btn btn-small">Clear Board</button>
                </div>
            </div>

            <div class="game-main">
                <div class="question-display">
                    <div id="questionText" class="question-text">Ready to play?</div>
                </div>

                <div class="answer-board">
                    <div id="answersContainer" class="answers-grid"></div>
                </div>

                <div class="round-info">
                    <div class="current-team">
                        <span>Active Team:</span>
                        <span id="activeTeamName" class="active-team-name">Team 1</span>
                    </div>
                    <div class="bank-display">
                        <span>Bank:</span>
                        <span id="bankValue" class="bank-value">0</span>
                    </div>
                    <div class="strikes">
                        <span id="strikeCounter" class="strike-counter"></span>
                    </div>
                </div>
            </div>

            <div class="game-controls">
                <div class="control-row">
                    <button id="logStrikeBtn" class="btn btn-control">Log Strike</button>
                    <button id="switchTeamBtn" class="btn btn-control">Switch Team</button>
                    <button id="bankPointsBtn" class="btn btn-control btn-accent">Bank Points</button>
                </div>
                <div class="control-row">
                    <button id="resetGameBtn" class="btn btn-secondary">Reset Game</button>
                </div>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="gameState.js"></script>
    <script src="ui.js"></script>
    <script src="app.js"></script>
</body>
</html>
